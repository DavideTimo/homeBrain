services:

  viessmann-sidecar:
    build: ./sidecar-viessmann
    container_name: casatimo-viessmann
    restart: unless-stopped
    volumes:
      - ./sidecar-viessmann/data:/data
    environment:
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1883
      - VIESSMANN_USER=${VIESSMANN_USER}
      - VIESSMANN_PASS=${VIESSMANN_PASS}
      - VIESSMANN_CLIENT_ID=${VIESSMANN_CLIENT_ID:-viessmann.vicare.android}
      - TOKEN_FILE=/data/viessmann_token.json
      - POLL_INTERVAL_SECONDS=${VIESSMANN_POLL_INTERVAL:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  huawei-sidecar:
    build: ./sidecar-huawei
    container_name: casatimo-huawei
    restart: unless-stopped
    environment:
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1883
      - FUSIONSOLAR_USER=${FUSIONSOLAR_USER}
      - FUSIONSOLAR_SYSCODE=${FUSIONSOLAR_SYSCODE}
      - POLL_INTERVAL_SECONDS=${HUAWEI_POLL_INTERVAL:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  viessmann-setup:
    build: ./sidecar-viessmann
    ports:
      - "4200:4200"
    volumes:
      - ./sidecar-viessmann/data:/data
    environment:
      - VIESSMANN_USER=${VIESSMANN_USER}
      - VIESSMANN_PASS=${VIESSMANN_PASS}
      - VIESSMANN_CLIENT_ID=${VIESSMANN_CLIENT_ID}
      - TOKEN_FILE=/data/viessmann_token.json
    command: python setup_token.py
    profiles:
      - setup
