services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: casatimo-mosquitto
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/config:/mosquitto/config:ro
    restart: unless-stopped

  api:
    image: ghcr.io/davidetimo/homebrain/casatimo-api:latest
    container_name: casatimo-api
    ports:
      - '5233:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__CasaTimoDb=Data Source=/data/casatimo.db
      - AllowedOrigins__0=http://localhost:5001
      - Jwt__Issuer=casatimo
      - Jwt__Audience=casatimo
      - Jwt__ExpiryDays=30
      # Jwt__Key e Auth__Username / Auth__Password vanno in .env (mai committare)
    env_file:
      - .env
    volumes:
      - casatimo_data:/data
      - nas_storage:/mnt/nas
    depends_on:
      - mosquitto
    restart: unless-stopped

  workers:
    image: ghcr.io/davidetimo/homebrain/casatimo-workers:latest
    container_name: casatimo-workers
    ports:
      - '9000:9000'   # OCPP 1.6 WebSocket — la wallbox si connette qui
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ApiBaseUrl=http://api:8080
      - Mqtt__Host=mosquitto
      - Mqtt__Port=1883
      - ConnectionStrings__CasaTimoDb=Data Source=/data/casatimo.db
    env_file:
      - .env
    volumes:
      - casatimo_data:/data
      - nas_storage:/mnt/nas
    depends_on:
      - mosquitto
      - api
    restart: unless-stopped

  web:
    image: ghcr.io/davidetimo/homebrain/casatimo-web:latest
    container_name: casatimo-web
    ports:
      - '5001:80'
    depends_on:
      - api
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: casatimo-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCOPE=casatimo
    command: --label-enable
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  casatimo_data:
  nas_storage:
