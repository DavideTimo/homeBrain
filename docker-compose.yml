services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: casatimo-mosquitto
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  viessmann-sidecar:
    build: ./sidecar-viessmann
    container_name: casatimo-viessmann
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./sidecar-viessmann/data:/data
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - VIESSMANN_USER=${VIESSMANN_USER}
      - VIESSMANN_PASS=${VIESSMANN_PASS}
      - VIESSMANN_CLIENT_ID=${VIESSMANN_CLIENT_ID:-viessmann.vicare.android}
      - TOKEN_FILE=/data/viessmann_token.json
      - POLL_INTERVAL_SECONDS=${VIESSMANN_POLL_INTERVAL:-300}

  viessmann-setup:
    build: ./sidecar-viessmann
    ports:
      - "4200:4200"
    volumes:
      - ./sidecar-viessmann/data:/data
    environment:
      - VIESSMANN_USER=${VIESSMANN_USER}
      - VIESSMANN_PASS=${VIESSMANN_PASS}
      - VIESSMANN_CLIENT_ID=${VIESSMANN_CLIENT_ID}
      - TOKEN_FILE=/data/viessmann_token.json
    command: python setup_token.py
    profiles:
      - setup

volumes:
  mosquitto_data:
  mosquitto_log:
