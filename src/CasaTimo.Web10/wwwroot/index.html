<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <title>Casa Tim&#242;</title>
    <base href="/" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CasaTimo.Web10.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Si &egrave; verificato un errore.
        <a href="." class="reload">Ricarica</a>
        <span class="dismiss">&#x2715;</span>
    </div>

    <script>
        // Service worker registration + update detection
        window.swUpdateAvailable = false;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newSW = reg.installing;
                    if (!newSW) return;
                    newSW.addEventListener('statechange', () => {
                        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                            window.swUpdateAvailable = true;
                        }
                    });
                });
            });
        }

        window.checkSwUpdate = () => window.swUpdateAvailable;

        window.applySwUpdate = () => {
            navigator.serviceWorker.ready.then(reg => {
                reg.waiting?.postMessage({ type: 'SKIP_WAITING' });
            });
            setTimeout(() => window.location.reload(), 300);
        };
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
